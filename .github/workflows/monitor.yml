name: x-monitor
on:
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: x-monitor
  cancel-in-progress: false
jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python monitor.py
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_TOPIC_ID:  "198621"
          X_AUTH_TOKEN:       ${{ secrets.X_AUTH_TOKEN }}
          X_CT0:              ${{ secrets.X_CT0 }}
          X_USERS:            "vladtenev,RobinhoodApp,RobinhoodCrypto,durov,satoshibigmoto,bennpeifert"
      - run: |
          git config user.name "bot"
          git config user.email "bot@users.noreply.github.com"
          git add state/last_seen.json
          git commit -m "update state" || echo "no changes"
          git push
